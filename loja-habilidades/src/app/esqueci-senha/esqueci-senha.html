<div class="container mt-4">

  <!-- TÍTULO -->
  <h3 class="titulo-habilidade text-apartir mb-4 text-center">
    🔑 Esqueci a senha
  </h3>

  <!-- INPUT EMAIL -->
  <input [(ngModel)]="email" name="email" class="form-control mb-3" placeholder="Informe seu email" />

  <!-- BOTÃO -->
  <button class="btn btn-game-buy w-100 mb-2" (click)="resetarSenha()">
    Resetar Senha
  </button>

</div>
